name: counterpoint

services:
  app:
    build:
      context: .
      target: runtime
    environment:
      APP_ORIGIN: "http://${PUBLIC_HOST:-localhost}:${COMPOSE_PORT:-8080}"
      DATABASE_PATH: /data/counterpoint.sqlite
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6}
      OPENAI_REALTIME_MODEL: ${OPENAI_REALTIME_MODEL:-gpt-realtime-2.1}
      PORT: "8787"
      REGULATORY_WEBHOOK_MAX_AGE_SECONDS: ${REGULATORY_WEBHOOK_MAX_AGE_SECONDS:-300}
      REGULATORY_WEBHOOK_SECRET: ${REGULATORY_WEBHOOK_SECRET:-}
      STORAGE_PATH: /data/artifacts
    ports:
      - "0.0.0.0:${COMPOSE_PORT:-8080}:8787"
    restart: unless-stopped
    volumes:
      - counterpoint-data:/data

volumes:
  counterpoint-data:
