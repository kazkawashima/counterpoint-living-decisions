name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      target:
        description: Cloudflare deployment target
        required: true
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.target }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_R2_BUCKET_NAME: ${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}
      CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
      CLOUDFLARE_DEPLOY_URL: ${{ vars.CLOUDFLARE_DEPLOY_URL }}
      CLOUDFLARE_DEPLOYMENT_APPROVED: ${{ inputs.target }}
      CLOUDFLARE_PRODUCTION_CONFIRMATION: ${{ vars.CLOUDFLARE_PRODUCTION_CONFIRMATION }}
      CLOUDFLARE_LOAD_DEV_VARS_FROM_DOT_ENV: "false"
      WRANGLER_SEND_METRICS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          target: ${{ inputs.target }}
        run: bash scripts/cloudflare-deploy.sh --apply "$target"
